<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Tralalero Idle</title>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Funnel Display-->
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
    <!-- Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!--- Favicon    -->
    <link rel="shortcut icon" type="image/x-icon" href="images/favicon.ico" />



</head>

<body >
    <script src = "js/script.js"></script>

    <section>
        <div class = "header">
            <p class = "title"> Tralalero Idle </p>
            <p class = "tralaleroCount"> Tralaleros: <b><span id="tralalero-amount">  </span></b> </p>
            <p class = "tralaleroCount"> Per Second: <b><span id= "tralaleroPerSecond" > </span></b></p>
            <a href = "index.html" class = "headerLinks"> Home </a>
            
            <a href = "about.html" class = "headerLinks"> About </a>
        </div>
        <div class = "main">
            
            <div class = "left">
                <img src = "images/tralalero.png" class = "tralaleroImage" onclick = "increaseTralalero()" draggable="false">
            </div>

            <!-- upgrades -->
            <div class = "mid">
                <!-- ALL ANIMALS RIGHT HERE -->
                <div id = "animals-container"></div>
            </div>

            <div class="right">
                <div class = "enhancements" onclick = "buyBombCroc()">
                    <span class = "tooltip"> 
                        Each Bombardino Crocodilo produces 0.5 Tralalero Tralalas per second.
                    </span>
                    <div class = "top-section">
                        <img src = "images/bombardinoCrocodilo.jpg" class = "upgradeImage">
                        <h4 class = "upgradeName"> WIP </h4>
                        <div class = "costInfo">
                            <p> <span id = "bombCrocCost"> </span> </p>
                            <img src = "images/tralalero.png" class = "currencyImage">
                        </div>
                    </div>
                    <div class = "bottom-section">
                        <p> Level <b><span id = "bombCrocLevel"> </span> </b> </p>
                    </div>
                </div>

    

            </div>


    </section>



</body>
</html>
